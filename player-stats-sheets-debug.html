<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BoxStrong Player Stat Board - Google Sheets Debug</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;700;800;900&display=swap');
    :root{--black:#030303;--panel:rgba(16,16,16,.92);--orange:#ff6a00;--gold:#ffb347;--white:#fff;--muted:#b8aea3;--border:rgba(255,140,26,.28);--danger:#ff3b3b}
    *{box-sizing:border-box}
    body{margin:0;width:100vw;height:100vh;overflow:hidden;color:var(--white);font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 18% 16%,rgba(255,106,0,.18),transparent 30%),radial-gradient(circle at 86% 82%,rgba(255,140,26,.16),transparent 32%),linear-gradient(135deg,#000 0%,#111 50%,#050505 100%)}
    .statboard{width:100vw;height:100vh;padding:3.2vh 3vw;display:grid;grid-template-rows:14vh 1fr 10vh;gap:2.4vh;position:relative}
    .statboard:before{content:"";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at center,black,transparent 75%);pointer-events:none}
    .top-strip,.leaderboard,.footer-card{position:relative;z-index:1;border:1px solid var(--border);box-shadow:0 0 38px rgba(0,0,0,.48),inset 0 0 24px rgba(255,255,255,.035);backdrop-filter:blur(10px)}
    .top-strip{border-radius:2.2vh;padding:1.8vh 2vw;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:linear-gradient(90deg,rgba(255,106,0,.22),rgba(0,0,0,.62),rgba(255,140,26,.22))}
    .brand-kicker,.meta-label,.footer-label{color:var(--muted);font-size:1.65vh;letter-spacing:.22em;font-weight:900;text-transform:uppercase}
    .brand-title{font-family:Anton,Impact,sans-serif;font-size:5.8vh;line-height:.9;letter-spacing:.08em;text-transform:uppercase}
    .center-title{text-align:center;background:#020202;border:.35vh solid var(--orange);border-radius:2vh;padding:1vh 2.4vw;min-width:30vw}
    .center-title .small{color:var(--muted);font-weight:900;letter-spacing:.18em;font-size:1.8vh;text-transform:uppercase}
    .center-title .big{font-family:Anton,Impact,sans-serif;color:var(--gold);font-size:5.6vh;line-height:1;letter-spacing:.06em;text-transform:uppercase}
    .right-meta{text-align:right}.right-meta .game{font-family:Anton,Impact,sans-serif;color:var(--gold);font-size:4.2vh;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .leaderboard{border-radius:3vh;overflow:hidden;background:var(--panel);display:grid;grid-template-rows:auto 1fr;min-height:0}
    .table-head,.player-row{display:grid;grid-template-columns:8vw 1fr 10vw 10vw 10vw 10vw;align-items:center;gap:1vw}
    .table-head{padding:1.7vh 2vw;background:linear-gradient(90deg,rgba(255,106,0,.26),rgba(0,0,0,.5),rgba(255,140,26,.18));color:var(--muted);font-size:1.6vh;font-weight:900;letter-spacing:.18em;text-transform:uppercase;border-bottom:1px solid var(--border)}
    .rows{min-height:0;overflow:hidden;padding:1.2vh 1vw 1.6vh;display:flex;flex-direction:column;gap:1vh}
    .player-row{min-height:8.4vh;padding:1.1vh 1vw;background:linear-gradient(90deg,rgba(255,255,255,.045),rgba(255,106,0,.07),rgba(0,0,0,.25));border:1px solid rgba(255,140,26,.18);border-radius:1.5vh;box-shadow:0 1vh 2vh rgba(0,0,0,.28)}
    .rank{font-family:Anton,Impact,sans-serif;font-size:4.4vh;color:var(--orange);text-align:center;font-variant-numeric:tabular-nums}.player-main{min-width:0}
    .player-name{font-family:Anton,Impact,sans-serif;font-size:4.5vh;line-height:1;letter-spacing:.035em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .player-sub{color:var(--muted);font-size:1.7vh;font-weight:900;letter-spacing:.12em;margin-top:.45vh;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat{text-align:center}.stat-value{font-family:Anton,Impact,sans-serif;color:var(--white);font-size:5.2vh;line-height:1;font-variant-numeric:tabular-nums}.stat-label{color:var(--muted);font-size:1.25vh;font-weight:900;letter-spacing:.18em;margin-top:.35vh;text-transform:uppercase}
    .top-player{background:linear-gradient(90deg,rgba(255,106,0,.28),rgba(255,140,26,.12),rgba(0,0,0,.25));border-color:rgba(255,179,71,.48)}.top-player .rank,.top-player .stat-value{color:var(--gold)}
    .footer-card{border-radius:2vh;padding:1.5vh 2vw;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:2vw;background:linear-gradient(90deg,rgba(0,0,0,.70),rgba(255,106,0,.14),rgba(255,140,26,.14))}
    .footer-main{font-family:Anton,Impact,sans-serif;color:var(--gold);font-size:3.4vh;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.connection{color:rgba(255,255,255,.5);font-size:1.25vh;letter-spacing:.08em;text-transform:uppercase;text-align:right;white-space:nowrap;max-width:32vw;overflow:hidden;text-overflow:ellipsis}
    .empty-state{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:2.6vh;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:3vh}
    .error-state{color:var(--danger)}
  </style>
</head>
<body>
  <main class="statboard">
    <section class="top-strip">
      <div><div class="brand-kicker">BEASTAVE</div><div class="brand-title">BOXSTRONG</div></div>
      <div class="center-title"><div class="small">Player Stat Board</div><div class="big" id="boardTitle">Top Performers</div></div>
      <div class="right-meta"><div class="meta-label">Source</div><div class="game">Google Sheet</div></div>
    </section>
    <section class="leaderboard">
      <div class="table-head"><div>Rank</div><div>Player</div><div>G</div><div>A</div><div>PTS</div><div>SOG</div></div>
      <div class="rows" id="rows"><div class="empty-state">Waiting for Google Sheet stats...</div></div>
    </section>
    <section class="footer-card">
      <div class="footer-label">Live Stats</div>
      <div class="footer-main" id="footerText">Google Sheets Stat Tracking</div>
      <div class="connection" id="connection">Connecting...</div>
    </section>
  </main>

  <script>
    /*
      Recommended setup:
      1. Publish the GamePlayersStats tab as CSV.
      2. Paste the published CSV URL below.
      This avoids broken OBS URLs caused by Google CSV links containing ? and & characters.
    */
    const DEFAULT_GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnrV5mFaMje4l5BHFQgSAEAzE9HC7YUSiZNZ_apYsTuNzwC67UNSGxlBxn2U79xTF7Kzvoppge4EPh/pub?gid=216837209&single=true&output=csv";

    const REFRESH_INTERVAL_MS = 3000;

    function getQueryParam(name){return new URLSearchParams(window.location.search).get(name)}
    function setStatus(text){document.getElementById("connection").textContent=text}
    function setMessage(text, isError=false){
      const rows=document.getElementById("rows");
      rows.innerHTML = `<div class="empty-state ${isError ? "error-state" : ""}">${escapeHtml(text)}</div>`;
    }

    const CSV_URL = getQueryParam("csv") || DEFAULT_GOOGLE_SHEET_CSV_URL;
    const BOARD_TITLE = getQueryParam("title") || "Top Performers";
    const LIMIT = Number(getQueryParam("limit") || 6);

    function parseCSV(text){
      const rows=[]; let row=[]; let value=""; let inQuotes=false;
      for(let i=0;i<text.length;i++){
        const c=text[i], n=text[i+1];
        if(c === '"' && inQuotes && n === '"'){ value += '"'; i++; }
        else if(c === '"'){ inQuotes = !inQuotes; }
        else if(c === "," && !inQuotes){ row.push(value); value=""; }
        else if((c === "\n" || c === "\r") && !inQuotes){
          if(c === "\r" && n === "\n") i++;
          row.push(value); value="";
          if(row.some(cell => cell.trim() !== "")) rows.push(row);
          row=[];
        } else { value += c; }
      }
      row.push(value);
      if(row.some(cell => cell.trim() !== "")) rows.push(row);
      return rows;
    }

    function normalizeHeader(h){return String(h||"").trim().toLowerCase().replace(/[^a-z0-9]/g,"")}
    function pick(obj,names,fallback=""){
      for(const name of names){
        const key=normalizeHeader(name);
        if(obj[key]!==undefined && obj[key] !== "") return obj[key];
      }
      return fallback;
    }

    function csvToPlayers(csvText){
      const rows=parseCSV(csvText);
      if(rows.length < 2) throw new Error("CSV loaded, but it has fewer than 2 rows. Check that GamePlayersStats has headers and player rows.");

      const headers=rows[0].map(normalizeHeader);
      const requiredNameHeaders=["name","player","playername"];
      const hasName=headers.some(h=>requiredNameHeaders.includes(h));
      if(!hasName){
        throw new Error("CSV loaded, but no Name/Player/Player Name column was found. Headers found: " + rows[0].join(" | "));
      }

      return rows.slice(1).map((row,index)=>{
        const obj={};
        headers.forEach((header,i)=>obj[header]=(row[i]||"").trim());

        const goals=Number(pick(obj,["goals","goal","g"],0))||0;
        const assists=Number(pick(obj,["assists","assist","a"],0))||0;
        const shots=Number(pick(obj,["shots","sog","shotsongoal"],0))||0;
        const points=Number(pick(obj,["points","pts"],goals+assists))||(goals+assists);

        return {
          id:index,
          name:pick(obj,["name","player","playername"],""),
          team:pick(obj,["team","teamname"],""),
          jersey:pick(obj,["jersey","number","#"],""),
          goals,assists,points,shots
        };
      }).filter(p=>p.name);
    }

    function sortPlayers(players){return players.sort((a,b)=>b.points-a.points||b.goals-a.goals||b.assists-a.assists||a.name.localeCompare(b.name))}
    function escapeHtml(value){return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}

    function renderPlayers(players){
      const rows=document.getElementById("rows");
      rows.innerHTML="";
      if(!players.length){setMessage("CSV loaded, but no player rows were found.", true);return}
      players.slice(0,LIMIT).forEach((player,index)=>{
        const row=document.createElement("div");
        row.className="player-row"+(index===0?" top-player":"");
        const jersey=player.jersey?"#"+player.jersey:"";
        const sub=[jersey,player.team].filter(Boolean).join(" · ");
        row.innerHTML=`
          <div class="rank">${index+1}</div>
          <div class="player-main">
            <div class="player-name">${escapeHtml(player.name)}</div>
            <div class="player-sub">${escapeHtml(sub||"Player")}</div>
          </div>
          <div class="stat"><div class="stat-value">${player.goals}</div><div class="stat-label">Goals</div></div>
          <div class="stat"><div class="stat-value">${player.assists}</div><div class="stat-label">Assists</div></div>
          <div class="stat"><div class="stat-value">${player.points}</div><div class="stat-label">Points</div></div>
          <div class="stat"><div class="stat-value">${player.shots}</div><div class="stat-label">Shots</div></div>`;
        rows.appendChild(row);
      });
    }

    async function loadStats(){
      if(!CSV_URL){
        setStatus("MISSING CSV URL");
        setMessage("Missing CSV URL. Paste the GamePlayersStats published CSV URL into DEFAULT_GOOGLE_SHEET_CSV_URL inside this HTML file.", true);
        return;
      }

      try{
        setStatus("LOADING GOOGLE SHEET...");
        const url=CSV_URL + (CSV_URL.includes("?") ? "&" : "?") + "cache=" + Date.now();
        const response=await fetch(url);
        if(!response.ok) throw new Error("Google Sheet request failed: HTTP " + response.status);
        const csvText=await response.text();

        if(csvText.trim().startsWith("<!DOCTYPE") || csvText.trim().startsWith("<html")){
          throw new Error("Google returned an HTML page, not CSV. The tab is probably not published as CSV or the link is wrong.");
        }

        const players=sortPlayers(csvToPlayers(csvText));
        renderPlayers(players);
        setStatus("GOOGLE SHEET LIVE · " + new Date().toLocaleTimeString());
      }catch(error){
        console.error(error);
        setStatus("GOOGLE SHEET ERROR");
        setMessage(error.message, true);
      }
    }

    document.addEventListener("DOMContentLoaded",()=>{
      document.getElementById("boardTitle").textContent=BOARD_TITLE;
      loadStats();
      setInterval(loadStats,REFRESH_INTERVAL_MS);
    });
  </script>
</body>
</html>
