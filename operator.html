<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BeastAve BoxStrong Operator</title>
  <style>
body{margin:0;background:#0b0d13;color:#fff;font-family:Arial,sans-serif}.operator{max-width:1280px;margin:0 auto;padding:24px}header{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:18px}h1{margin:0 0 8px}p{color:#aeb8cc;margin:0}.status-pill{background:#1d2637;border:1px solid #33415c;border-radius:999px;padding:10px 14px;color:#ffc933;font-weight:900}.layout{display:grid;grid-template-columns:repeat(2,minmax(320px,1fr));gap:16px}.card{background:#151a25;border:1px solid #2b3448;border-radius:18px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.25)}.card.wide{grid-column:1/-1}h2{margin:0 0 14px}h3{margin:0 0 8px;color:#aeb8cc}.clock-display,.shot-display,.big-number{font-size:72px;font-weight:950;letter-spacing:.03em;font-variant-numeric:tabular-nums;margin:8px 0 14px}.shot-display{color:#ffc933}.button-grid,.stat-grid,.button-row{display:flex;flex-wrap:wrap;gap:8px}button{border:0;border-radius:10px;background:#ffc933;color:#090b10;padding:13px 15px;font-weight:950;cursor:pointer}button:hover{filter:brightness(1.08)}button.danger{background:#ff3232;color:#fff}label{display:flex;flex-direction:column;gap:6px;margin-top:12px;color:#cbd5e8;font-weight:800}input{background:#0a0d14;color:#fff;border:1px solid #344056;border-radius:10px;padding:12px;font-size:16px}.score-controls{display:grid;grid-template-columns:1fr 1fr;gap:14px}.score-controls>div{background:#0f131d;border-radius:14px;padding:14px;text-align:center}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:10px 14px}@media(max-width:760px){header,.layout,.score-controls,.form-grid{grid-template-columns:1fr;display:grid}}
</style>
</head>
<body>
<main class="operator">
    <header>
      <div>
        <h1>BeastAve BoxStrong Operator</h1>
        <p>Open <strong>index.html</strong> as the OBS Browser Source or video-board page. Keep this page open on the same computer/browser.</p>
      </div>
      <div><div class="status-pill" id="saveStatus">Ready</div><div id="gameLink" style="margin-top:8px;color:#aeb8cc;font-weight:800;text-align:right;">Game ID</div></div>
    </header>
    <section class="layout">
      <div class="card">
        <h2>Game Clock</h2>
        <div class="clock-display" id="gameClockDisplay">12:00</div>
        <div class="button-grid">
          <button id="gameStart">Start</button><button id="gameStop">Stop</button><button id="gameReset">Reset 12:00</button>
          <button data-clock-set="15:00">15:00</button><button data-clock-set="12:00">12:00</button><button data-clock-set="10:00">10:00</button>
        </div>
        <label>Manual Clock <input id="gameClockInput" placeholder="12:00" /></label>
      </div>
      <div class="card shot-card">
        <h2>Shot Clock</h2>
        <div class="shot-display" id="shotClockDisplay">30</div>
        <div class="button-grid">
          <button id="shotStart">Start</button><button id="shotStop">Stop</button><button id="shotReset30">Reset 30</button>
          <button id="shotReset15">Reset 15</button><button id="shotReset10">Reset 10</button><button id="shotReset0">Set 0</button>
        </div>
      </div>
      <div class="card">
        <h2>Score</h2>
        <div class="score-controls">
          <div><h3 id="homeTitle">Home</h3><div class="big-number" id="homeScoreDisplay">0</div><button data-adjust="homeScore:1">+ Goal</button><button data-adjust="homeScore:-1">- Goal</button></div>
          <div><h3 id="awayTitle">Away</h3><div class="big-number" id="awayScoreDisplay">0</div><button data-adjust="awayScore:1">+ Goal</button><button data-adjust="awayScore:-1">- Goal</button></div>
        </div>
      </div>
      <div class="card">
        <h2>Shots / Penalties / Timeouts</h2>
        <div class="stat-grid">
          <button data-adjust="homeShots:1">Home Shot +</button><button data-adjust="homeShots:-1">Home Shot -</button>
          <button data-adjust="awayShots:1">Away Shot +</button><button data-adjust="awayShots:-1">Away Shot -</button>
          <button data-adjust="homePenalties:1">Home Pen +</button><button data-adjust="awayPenalties:1">Away Pen +</button>
          <button data-adjust="homeTimeouts:-1">Home TO Used</button><button data-adjust="awayTimeouts:-1">Away TO Used</button>
        </div>
      </div>
      <div class="card wide">
        <h2>Game Setup</h2>
        <div class="form-grid">
          <label>League Title <input data-input="leagueTitle" /></label><label>Status <input data-input="gameStatus" /></label>
          <label>Period <input data-input="period" /></label><label>Possession <input data-input="possession" placeholder="Home / Away / --" /></label>
          <label>Home Team <input data-input="homeTeam" /></label><label>Away Team <input data-input="awayTeam" /></label>
          <label>Home Logo Path <input data-input="homeLogo" placeholder="logos/sabretooths.png" /></label><label>Away Logo Path <input data-input="awayLogo" placeholder="logos/phoenix.png" /></label>
          <label>Home Record <input data-input="homeRecord" /></label><label>Away Record <input data-input="awayRecord" /></label>
          <label>Last Goal <input data-input="lastGoal" /></label><label>Note <input data-input="note" /></label>
        </div>
        <div class="button-row">
          <button id="nextPeriod">Next Period</button><button id="swapPossession">Swap Possession</button><button id="clearLastGoal">Clear Last Goal</button><button class="danger" id="resetGame">Reset Game</button>
        </div>
      </div>
    </section>
  </main>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
const defaultState = {
  leagueTitle: "BOXSTRONG",
  gameStatus: "LIVE",
  period: "Q1",
  gameClock: "12:00",
  shotClock: "30",
  homeTeam: "SABRETOOTHS",
  awayTeam: "PHOENIX",
  homeLogo: "",
  awayLogo: "",
  homeRecord: "0-0",
  awayRecord: "0-0",
  homeScore: 0,
  awayScore: 0,
  homeShots: 0,
  awayShots: 0,
  homePenalties: 0,
  awayPenalties: 0,
  homeTimeouts: 2,
  awayTimeouts: 2,
  possession: "--",
  lastGoal: "--",
  note: "Week 1 Matchup",
  connection: "FIREBASE LIVE"
};

function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const SCOREBOARD_GAME_ID = getQueryParam("game") || window.BEASTAVE_DEFAULT_GAME_ID || "week-1";
let currentState = { ...defaultState };

function mmssToSeconds(value) {
  const parts = String(value || "0:00").split(":").map(Number);
  if (parts.length !== 2 || parts.some(Number.isNaN)) return 0;
  return Math.max(0, parts[0] * 60 + parts[1]);
}

function secondsToMmss(total) {
  const safe = Math.max(0, Number(total) || 0);
  const minutes = Math.floor(safe / 60);
  const seconds = safe % 60;
  return `${minutes}:${String(seconds).padStart(2, "0")}`;
}

function clampNumber(value, min = 0, max = 999) {
  return Math.min(max, Math.max(min, Number(value) || 0));
}

function requireFirebaseConfig() {
  if (!window.BEASTAVE_FIREBASE_CONFIG || !window.BEASTAVE_FIREBASE_CONFIG.apiKey) {
    throw new Error("Missing Firebase config. Open firebase-config.js and paste your Firebase web app config.");
  }
}

function initFirebaseScoreboard(onStateChange) {
  requireFirebaseConfig();

  if (!firebase.apps.length) {
    firebase.initializeApp(window.BEASTAVE_FIREBASE_CONFIG);
  }

  const db = firebase.database();
  const gameRef = db.ref(`scoreboards/${SCOREBOARD_GAME_ID}`);

  gameRef.on("value", async (snapshot) => {
    const data = snapshot.val();

    if (!data) {
      await gameRef.set({
        ...defaultState,
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      });
      return;
    }

    currentState = { ...defaultState, ...data, connection: `FIREBASE LIVE · ${SCOREBOARD_GAME_ID}` };
    if (typeof onStateChange === "function") onStateChange(currentState);
  }, (error) => {
    console.error("Firebase listener error:", error);
    currentState = { ...currentState, connection: "FIREBASE ERROR" };
    if (typeof onStateChange === "function") onStateChange(currentState);
  });

  return gameRef;
}

function updateFirebaseState(patch) {
  if (!window.beastAveGameRef) {
    console.error("Firebase game ref is not ready yet.");
    return Promise.reject(new Error("Firebase game ref is not ready yet."));
  }

  return window.beastAveGameRef.update({
    ...patch,
    updatedAt: firebase.database.ServerValue.TIMESTAMP
  });
}

function getScoreboardState() {
  return { ...currentState };
}
</script>
<script>
let gameTimer = null;
let shotTimer = null;

function byId(id) { return document.getElementById(id); }

function setSaveStatus(text) {
  const el = byId("saveStatus");
  if (!el) return;
  el.textContent = text;
  window.clearTimeout(setSaveStatus.timer);
  setSaveStatus.timer = window.setTimeout(() => el.textContent = "Ready", 900);
}

function renderOperator(state = getScoreboardState()) {
  byId("gameClockDisplay").textContent = state.gameClock;
  byId("shotClockDisplay").textContent = state.shotClock;
  byId("homeScoreDisplay").textContent = state.homeScore;
  byId("awayScoreDisplay").textContent = state.awayScore;
  byId("homeTitle").textContent = state.homeTeam;
  byId("awayTitle").textContent = state.awayTeam;

  const gameLink = byId("gameLink");
  if (gameLink) gameLink.textContent = `Game ID: ${SCOREBOARD_GAME_ID}`;

  document.querySelectorAll("[data-input]").forEach((input) => {
    const key = input.dataset.input;
    if (document.activeElement !== input) input.value = state[key] ?? "";
  });

  const clockInput = byId("gameClockInput");
  if (clockInput && document.activeElement !== clockInput) clockInput.value = state.gameClock;
}

async function updateState(patch) {
  try {
    await updateFirebaseState(patch);
    setSaveStatus("Updated");
  } catch (error) {
    console.error(error);
    setSaveStatus("Error");
    alert(error.message);
  }
}

function startGameClock() {
  if (gameTimer) return;

  gameTimer = window.setInterval(() => {
    const state = getScoreboardState();
    const remaining = mmssToSeconds(state.gameClock);

    if (remaining <= 0) {
      stopGameClock();
      return;
    }

    updateFirebaseState({ gameClock: secondsToMmss(remaining - 1) }).catch(console.error);
  }, 1000);

  setSaveStatus("Game clock running");
}

function stopGameClock() {
  window.clearInterval(gameTimer);
  gameTimer = null;
  setSaveStatus("Game clock stopped");
}

function startShotClock() {
  if (shotTimer) return;

  shotTimer = window.setInterval(() => {
    const state = getScoreboardState();
    const remaining = clampNumber(state.shotClock, 0, 99);

    if (remaining <= 0) {
      stopShotClock();
      return;
    }

    updateFirebaseState({ shotClock: String(remaining - 1) }).catch(console.error);
  }, 1000);

  setSaveStatus("Shot clock running");
}

function stopShotClock() {
  window.clearInterval(shotTimer);
  shotTimer = null;
  setSaveStatus("Shot clock stopped");
}

function bindControls() {
  byId("gameStart").addEventListener("click", startGameClock);
  byId("gameStop").addEventListener("click", stopGameClock);
  byId("gameReset").addEventListener("click", () => updateState({ gameClock: "12:00" }));

  document.querySelectorAll("[data-clock-set]").forEach((button) => {
    button.addEventListener("click", () => updateState({ gameClock: button.dataset.clockSet }));
  });

  byId("gameClockInput").addEventListener("change", (e) => updateState({ gameClock: e.target.value || "0:00" }));

  byId("shotStart").addEventListener("click", startShotClock);
  byId("shotStop").addEventListener("click", stopShotClock);
  byId("shotReset30").addEventListener("click", () => updateState({ shotClock: "30" }));
  byId("shotReset15").addEventListener("click", () => updateState({ shotClock: "15" }));
  byId("shotReset10").addEventListener("click", () => updateState({ shotClock: "10" }));
  byId("shotReset0").addEventListener("click", () => updateState({ shotClock: "0" }));

  document.querySelectorAll("[data-adjust]").forEach((button) => {
    button.addEventListener("click", () => {
      const [key, deltaRaw] = button.dataset.adjust.split(":");
      const delta = Number(deltaRaw);
      const state = getScoreboardState();
      updateState({ [key]: clampNumber(Number(state[key]) + delta, 0, 999) });
    });
  });

  document.querySelectorAll("[data-input]").forEach((input) => {
    input.addEventListener("input", () => {
      const key = input.dataset.input;
      updateState({ [key]: input.value });
    });
  });

  byId("nextPeriod").addEventListener("click", () => {
    const order = ["Q1", "Q2", "Q3", "Q4", "OT"];
    const state = getScoreboardState();
    const currentIndex = order.indexOf(state.period);
    const next = currentIndex >= 0 ? order[(currentIndex + 1) % order.length] : "Q1";
    updateState({ period: next });
  });

  byId("swapPossession").addEventListener("click", () => {
    const state = getScoreboardState();
    let next = state.possession === state.homeTeam ? state.awayTeam : state.homeTeam;
    if (!state.possession || state.possession === "--") next = state.homeTeam;
    updateState({ possession: next });
  });

  byId("clearLastGoal").addEventListener("click", () => updateState({ lastGoal: "--" }));

  byId("resetGame").addEventListener("click", () => {
    stopGameClock();
    stopShotClock();
    updateState({ ...defaultState });
  });
}

document.addEventListener("DOMContentLoaded", () => {
  try {
    window.beastAveGameRef = initFirebaseScoreboard((state) => {
      renderOperator(state);
    });
    bindControls();
    renderOperator();
    setSaveStatus("Firebase connected");
  } catch (error) {
    console.error(error);
    setSaveStatus("Config error");
    alert(error.message);
  }
});
</script>
</body>
</html>
