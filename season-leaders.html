<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Beast Ave Season Leaders</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;700;800;900&display=swap');

    :root{
      --black:#030303;
      --panel:rgba(16,16,16,.92);
      --orange:#ff6a00;
      --gold:#ffb347;
      --white:#fff;
      --muted:#b8aea3;
      --border:rgba(255,140,26,.28);
      --danger:#ff3b3b;
      --silver:#d7d7d7;
      --bronze:#cd7f32;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      width:100vw;
      height:100vh;
      overflow:hidden;
      color:var(--white);
      font-family:Inter,Arial,sans-serif;
      background:
        radial-gradient(circle at 18% 16%,rgba(255,106,0,.18),transparent 30%),
        radial-gradient(circle at 86% 82%,rgba(255,140,26,.16),transparent 32%),
        linear-gradient(135deg,#000 0%,#111 50%,#050505 100%);
    }

    .statboard{
      width:100vw;
      height:100vh;
      padding:3.2vh 3vw;
      display:grid;
      grid-template-rows:14vh 1fr 10vh;
      gap:2.4vh;
      position:relative;
    }

    .statboard:before{
      content:"SEASON\A LEADERS";
      white-space:pre;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Anton,Impact,sans-serif;
      font-size:21vh;
      line-height:.9;
      letter-spacing:.12em;
      color:rgba(255,255,255,.035);
      text-align:center;
      position:absolute;
      inset:0;
      background:
        linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:48px 48px;
      mask-image:radial-gradient(circle at center,black,transparent 75%);
      pointer-events:none;
    }

    .top-strip,.leaderboard,.footer-card{
      position:relative;
      z-index:1;
      border:1px solid var(--border);
      box-shadow:0 0 38px rgba(0,0,0,.48),inset 0 0 24px rgba(255,255,255,.035);
      backdrop-filter:blur(10px);
    }

    .top-strip{
      border-radius:2.2vh;
      padding:1.8vh 2vw;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      background:linear-gradient(90deg,rgba(255,106,0,.22),rgba(0,0,0,.62),rgba(255,140,26,.22));
    }

    .brand-kicker,.meta-label,.footer-label{
      color:var(--muted);
      font-size:1.65vh;
      letter-spacing:.22em;
      font-weight:900;
      text-transform:uppercase;
    }

    .brand-title{
      font-family:Anton,Impact,sans-serif;
      font-size:5.8vh;
      line-height:.9;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .center-title{
      text-align:center;
      background:radial-gradient(circle at center,rgba(255,106,0,.20),#020202 62%);
      border:.45vh solid var(--orange);
      border-radius:2vh;
      padding:.8vh 2.8vw 1vh;
      min-width:36vw;
      box-shadow:0 0 32px rgba(255,106,0,.20), inset 0 0 18px rgba(255,179,71,.08);
    }

    .center-title .small{
      color:var(--muted);
      font-weight:900;
      letter-spacing:.24em;
      font-size:1.65vh;
      text-transform:uppercase;
    }

    .center-title .big{
      font-family:Anton,Impact,sans-serif;
      color:var(--gold);
      font-size:6.6vh;
      line-height:.95;
      letter-spacing:.075em;
      text-transform:uppercase;
      text-shadow:0 0 24px rgba(255,106,0,.55);
    }

    .season-word{color:var(--white)}
    .leaders-word{color:var(--gold)}

    .right-meta{text-align:right}

    .right-meta .game{
      font-family:Anton,Impact,sans-serif;
      color:var(--gold);
      font-size:4.2vh;
      letter-spacing:.06em;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .leaderboard{
      border-radius:3vh;
      overflow:hidden;
      background:var(--panel);
      display:grid;
      grid-template-rows:auto 1fr;
      min-height:0;
    }

    .table-head,.player-row{
      display:grid;
      grid-template-columns:7vw 1fr 11vw 11vw 13vw;
      align-items:center;
      gap:.8vw;
    }

    .table-head{
      padding:1.7vh 2vw;
      background:linear-gradient(90deg,rgba(255,106,0,.26),rgba(0,0,0,.5),rgba(255,140,26,.18));
      color:var(--muted);
      font-size:1.45vh;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
      border-bottom:1px solid var(--border);
    }

    .rows{
      min-height:0;
      overflow:hidden;
      padding:1.2vh 1vw 1.6vh;
      display:flex;
      flex-direction:column;
      gap:1vh;
    }

    .player-row{
      min-height:10.6vh;
      padding:1.1vh 1vw;
      background:linear-gradient(90deg,rgba(255,255,255,.045),rgba(255,106,0,.07),rgba(0,0,0,.25));
      border:1px solid rgba(255,140,26,.18);
      border-radius:1.5vh;
      box-shadow:0 1vh 2vh rgba(0,0,0,.28);
    }

    .rank{
      font-family:Anton,Impact,sans-serif;
      font-size:5.4vh;
      color:var(--orange);
      text-align:center;
      font-variant-numeric:tabular-nums;
    }

    .rank-gold{color:var(--gold);text-shadow:0 0 22px rgba(255,179,71,.6)}
    .rank-silver{color:var(--silver);text-shadow:0 0 18px rgba(255,255,255,.35)}
    .rank-bronze{color:var(--bronze);text-shadow:0 0 18px rgba(205,127,50,.45)}

    .leader-card{
    position:relative;
    padding:20px;
}

.leader-badge{
    position:absolute;
    top:12px;
    right:12px;
    font-size:12px;
    font-weight:700;
    padding:4px 10px;
    border-radius:20px;
    white-space:nowrap;
}

.player-name{
    padding-right:110px; /* reserve room for badge */
}

    .player-main{min-width:0}

    .player-name{
      font-family:Anton,Impact,sans-serif;
      font-size:4.8vh;
      line-height:1;
      letter-spacing:.035em;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .player-sub{
      color:var(--muted);
      font-size:1.55vh;
      font-weight:900;
      letter-spacing:.12em;
      margin-top:.45vh;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .stat{text-align:center}

    .stat-value{
      font-family:Anton,Impact,sans-serif;
      color:var(--white);
      font-size:5.8vh;
      line-height:1;
      font-variant-numeric:tabular-nums;
    }

    .stat-label{
      color:var(--muted);
      font-size:1.1vh;
      font-weight:900;
      letter-spacing:.16em;
      margin-top:.35vh;
      text-transform:uppercase;
    }

    .points .stat-value{
      color:var(--gold);
      font-size:7.2vh;
      text-shadow:0 0 22px rgba(255,106,0,.55);
    }

    .top-player{
      background:linear-gradient(90deg,rgba(255,106,0,.32),rgba(255,179,71,.14),rgba(0,0,0,.25));
      border-color:rgba(255,179,71,.62);
      box-shadow:0 1vh 2.4vh rgba(0,0,0,.34),0 0 26px rgba(255,106,0,.18);
    }

    .top-player .rank,.top-player .stat-value{color:var(--gold)}

    .footer-card{
      border-radius:2vh;
      padding:1.5vh 2vw;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:2vw;
      background:linear-gradient(90deg,rgba(0,0,0,.70),rgba(255,106,0,.14),rgba(255,140,26,.14));
    }

    .footer-main{
      font-family:Anton,Impact,sans-serif;
      color:var(--gold);
      font-size:3.4vh;
      letter-spacing:.05em;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .connection{
      color:rgba(255,255,255,.5);
      font-size:1.25vh;
      letter-spacing:.08em;
      text-transform:uppercase;
      text-align:right;
      white-space:nowrap;
      max-width:34vw;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .empty-state{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--muted);
      font-size:2.6vh;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      padding:3vh;
    }

    .error-state{color:var(--danger)}
  </style>
</head>

<body>
  <main class="statboard">
    <section class="top-strip">
      <div>
        <div class="brand-kicker">BEASTAVE</div>
        <div class="brand-title">BOXSTRONG</div>
      </div>

      <div class="center-title">
        <div class="small" id="boardTitle">Top 5</div>
        <div class="big"><span class="season-word">Season</span> <span class="leaders-word">Leaders</span></div>
      </div>

      <div class="right-meta">
        <div class="meta-label">Season Totals</div>
        <div class="game">POINTS RACE</div>
      </div>
    </section>

    <section class="leaderboard">
      <div class="table-head">
        <div>Rank</div>
        <div>Player</div>
        <div>Goals</div>
        <div>Assists</div>
        <div>Points</div>
      </div>

      <div class="rows" id="rows">
        <div class="empty-state">Loading season leaders...</div>
      </div>
    </section>

    <section class="footer-card">
      <div class="footer-label">Season Board</div>
      <div class="footer-main" id="footerText">Updated After Every Game · Goals + Assists = Points</div>
      <div class="connection" id="connection">Connecting...</div>
    </section>
  </main>

  <script>
    const SEASON_LEADERS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnrV5mFaMje4l5BHFQgSAEAzE9HC7YUSiZNZ_apYsTuNzwC67UNSGxlBxn2U79xTF7Kzvoppge4EPh/pub?gid=1926793357&single=true&output=csv";
    const REFRESH_INTERVAL_MS = 5000;

    function getQueryParam(name){return new URLSearchParams(window.location.search).get(name)}
    const BOARD_TITLE = getQueryParam("title") || "Top 5 Season Totals";
    const LIMIT = Number(getQueryParam("limit") || 5);

    function escapeHtml(value){
      return String(value)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function setStatus(text){document.getElementById("connection").textContent=text}

    function setMessage(text,isError=false){
      document.getElementById("rows").innerHTML =
        `<div class="empty-state ${isError?"error-state":""}">${escapeHtml(text)}</div>`;
    }

    function parseCSV(text){
      const rows=[]; let row=[]; let value=""; let inQuotes=false;
      for(let i=0;i<text.length;i++){
        const c=text[i], n=text[i+1];
        if(c === '"' && inQuotes && n === '"'){value+='"'; i++}
        else if(c === '"'){inQuotes=!inQuotes}
        else if(c === "," && !inQuotes){row.push(value); value=""}
        else if((c === "\n" || c === "\r") && !inQuotes){
          if(c === "\r" && n === "\n") i++;
          row.push(value); value="";
          if(row.some(cell=>cell.trim()!=="")) rows.push(row);
          row=[];
        } else value+=c;
      }
      row.push(value);
      if(row.some(cell=>cell.trim()!=="")) rows.push(row);
      return rows;
    }

    function normalizeHeader(h){
      return String(h||"").trim().toLowerCase().replace(/[^a-z0-9]/g,"");
    }

    function rowsToObjects(csvText){
      const rows=parseCSV(csvText);
      if(rows.length < 2) return [];
      const headers=rows[0].map(normalizeHeader);
      return rows.slice(1).map(row=>{
        const obj={};
        headers.forEach((h,i)=>obj[h]=(row[i]||"").trim());
        return obj;
      });
    }

    function pick(obj,names,fallback=""){
      for(const name of names){
        const key=normalizeHeader(name);
        if(obj[key] !== undefined && obj[key] !== "") return obj[key];
      }
      return fallback;
    }

    async function fetchCSV(url){
      const full=url + (url.includes("?") ? "&" : "?") + "cache=" + Date.now();
      const response=await fetch(full);
      if(!response.ok) throw new Error("CSV request failed HTTP " + response.status);
      const text=await response.text();
      if(text.trim().startsWith("<!DOCTYPE") || text.trim().startsWith("<html")){
        throw new Error("Google returned HTML, not CSV. Check Publish to web settings.");
      }
      return text;
    }

    function normalizePlayerName(raw){
      const value = String(raw || "").trim();
      return value || "Player";
    }

    function buildLeaders(objects){
      return objects.map(row=>{
        const goals=Number(pick(row,["Goals","G"],0))||0;
        const assists=Number(pick(row,["Assists","A"],0))||0;
        const points=Number(pick(row,["Points","PTS"],"")) || (goals + assists);

        return {
          name: normalizePlayerName(pick(row,[
            "PlayerDisplay","Player Display","PlayerName","Player Name","Player","Name","PlayerID"
          ],"Player")),
          team: pick(row,["Team","TeamName","Team Name"],""),
          goals, assists, points
        };
      }).filter(p=>p.points > 0)
        .sort((a,b)=>b.points-a.points || b.goals-a.goals || b.assists-a.assists || a.name.localeCompare(b.name));
    }

    function renderPlayers(players){
      const rows=document.getElementById("rows");
      rows.innerHTML="";

      if(!players.length){
        setMessage("No season leaders found", true);
        return;
      }

      players.slice(0,LIMIT).forEach((player,index)=>{
        const row=document.createElement("div");
        row.className="player-row"+(index===0?" top-player":"");
        const sub=player.team ? player.team + " · Season Total" : "Season Total";
        const rankClass = index===0 ? "rank-gold" : index===1 ? "rank-silver" : index===2 ? "rank-bronze" : "";
        const badge = index===0 ? `<div class="leader-badge">Current Points Leader</div>` : "";
        row.innerHTML=`
          <div class="rank ${rankClass}">${index+1}</div>
          <div class="player-main">
            ${badge}
            <div class="player-name">${escapeHtml(player.name)}</div>
            <div class="player-sub">${escapeHtml(sub)}</div>
          </div>
          <div class="stat"><div class="stat-value">${player.goals}</div><div class="stat-label">Goals</div></div>
          <div class="stat"><div class="stat-value">${player.assists}</div><div class="stat-label">Assists</div></div>
          <div class="stat points"><div class="stat-value">${player.points}</div><div class="stat-label">Points</div></div>`;
        rows.appendChild(row);
      });
    }

    async function loadLeaders(){
      try{
        setStatus("LOADING SHEET...");
        const csv=await fetchCSV(SEASON_LEADERS_CSV_URL);
        const objects=rowsToObjects(csv);
        const leaders=buildLeaders(objects);
        renderPlayers(leaders);
        setStatus("LIVE · " + new Date().toLocaleTimeString());
      }catch(error){
        console.error(error);
        setStatus("ERROR");
        setMessage(error.message, true);
      }
    }

    document.addEventListener("DOMContentLoaded",()=>{
      document.getElementById("boardTitle").textContent=BOARD_TITLE;
      loadLeaders();
      setInterval(loadLeaders, REFRESH_INTERVAL_MS);
    });
  </script>
</body>
</html>
