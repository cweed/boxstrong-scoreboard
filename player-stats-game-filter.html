<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BoxStrong Live Player Stats</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;700;800;900&display=swap');
    :root{--black:#030303;--panel:rgba(16,16,16,.92);--orange:#ff6a00;--gold:#ffb347;--white:#fff;--muted:#b8aea3;--border:rgba(255,140,26,.28);--danger:#ff3b3b}
    *{box-sizing:border-box}
    body{margin:0;width:100vw;height:100vh;overflow:hidden;color:var(--white);font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 18% 16%,rgba(255,106,0,.18),transparent 30%),radial-gradient(circle at 86% 82%,rgba(255,140,26,.16),transparent 32%),linear-gradient(135deg,#000 0%,#111 50%,#050505 100%)}
    .statboard{width:100vw;height:100vh;padding:3.2vh 3vw;display:grid;grid-template-rows:14vh 1fr 10vh;gap:2.4vh;position:relative}
    .statboard:before{content:"";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at center,black,transparent 75%);pointer-events:none}
    .top-strip,.leaderboard,.footer-card{position:relative;z-index:1;border:1px solid var(--border);box-shadow:0 0 38px rgba(0,0,0,.48),inset 0 0 24px rgba(255,255,255,.035);backdrop-filter:blur(10px)}
    .top-strip{border-radius:2.2vh;padding:1.8vh 2vw;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:linear-gradient(90deg,rgba(255,106,0,.22),rgba(0,0,0,.62),rgba(255,140,26,.22))}
    .brand-kicker,.meta-label,.footer-label{color:var(--muted);font-size:1.65vh;letter-spacing:.22em;font-weight:900;text-transform:uppercase}
    .brand-title{font-family:Anton,Impact,sans-serif;font-size:5.8vh;line-height:.9;letter-spacing:.08em;text-transform:uppercase}
    .center-title{text-align:center;background:#020202;border:.35vh solid var(--orange);border-radius:2vh;padding:1vh 2.4vw;min-width:30vw}
    .center-title .small{color:var(--muted);font-weight:900;letter-spacing:.18em;font-size:1.8vh;text-transform:uppercase}
    .center-title .big{font-family:Anton,Impact,sans-serif;color:var(--gold);font-size:5.6vh;line-height:1;letter-spacing:.06em;text-transform:uppercase}
    .right-meta{text-align:right;min-width:0}
    .right-meta .game{font-family:Anton,Impact,sans-serif;color:var(--gold);font-size:3.7vh;line-height:1.05;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .right-meta .scoreline{font-family:Anton,Impact,sans-serif;color:var(--white);font-size:3.2vh;line-height:1.05;letter-spacing:.05em;text-transform:uppercase;margin-top:.45vh;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .leaderboard{border-radius:3vh;overflow:hidden;background:var(--panel);display:grid;grid-template-rows:auto 1fr;min-height:0}
    .table-head,.player-row{display:grid;grid-template-columns:7vw 1fr 8vw 8vw 8vw 8vw 8vw 8vw;align-items:center;gap:.8vw}
    .table-head{padding:1.7vh 2vw;background:linear-gradient(90deg,rgba(255,106,0,.26),rgba(0,0,0,.5),rgba(255,140,26,.18));color:var(--muted);font-size:1.45vh;font-weight:900;letter-spacing:.16em;text-transform:uppercase;border-bottom:1px solid var(--border)}
    .rows{min-height:0;overflow:hidden;padding:1.2vh 1vw 1.6vh;display:flex;flex-direction:column;gap:1vh}
    .player-row{min-height:8.4vh;padding:1.1vh 1vw;background:linear-gradient(90deg,rgba(255,255,255,.045),rgba(255,106,0,.07),rgba(0,0,0,.25));border:1px solid rgba(255,140,26,.18);border-radius:1.5vh;box-shadow:0 1vh 2vh rgba(0,0,0,.28)}
    .rank{font-family:Anton,Impact,sans-serif;font-size:4.2vh;color:var(--orange);text-align:center;font-variant-numeric:tabular-nums}.player-main{min-width:0}
    .player-name{font-family:Anton,Impact,sans-serif;font-size:4.1vh;line-height:1;letter-spacing:.035em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .player-sub{color:var(--muted);font-size:1.55vh;font-weight:900;letter-spacing:.12em;margin-top:.45vh;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat{text-align:center}.stat-value{font-family:Anton,Impact,sans-serif;color:var(--white);font-size:4.8vh;line-height:1;font-variant-numeric:tabular-nums}.stat-label{color:var(--muted);font-size:1.1vh;font-weight:900;letter-spacing:.16em;margin-top:.35vh;text-transform:uppercase}
    .top-player{background:linear-gradient(90deg,rgba(255,106,0,.28),rgba(255,140,26,.12),rgba(0,0,0,.25));border-color:rgba(255,179,71,.48)}.top-player .rank,.top-player .stat-value{color:var(--gold)}
    .footer-card{border-radius:2vh;padding:1.5vh 2vw;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:2vw;background:linear-gradient(90deg,rgba(0,0,0,.70),rgba(255,106,0,.14),rgba(255,140,26,.14))}
    .footer-main{font-family:Anton,Impact,sans-serif;color:var(--gold);font-size:3.4vh;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.connection{color:rgba(255,255,255,.5);font-size:1.25vh;letter-spacing:.08em;text-transform:uppercase;text-align:right;white-space:nowrap;max-width:34vw;overflow:hidden;text-overflow:ellipsis}
    .empty-state{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:2.6vh;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:3vh}
    .error-state{color:var(--danger)}
  </style>
</head>
<body>
  <main class="statboard">
    <section class="top-strip">
      <div><div class="brand-kicker">BEASTAVE</div><div class="brand-title">BOXSTRONG</div></div>
      <div class="center-title"><div class="small">Live Game Stats</div><div class="big" id="boardTitle">Top Performers</div></div>
      <div class="right-meta">
        <div class="meta-label">Current Matchup</div>
        <div class="game" id="gameDisplayName">--</div>
        <div class="scoreline" id="gameScoreline"></div>
      </div>
    </section>
    <section class="leaderboard">
      <div class="table-head"><div>Rank</div><div>Player</div><div>G</div><div>A</div><div>PTS</div><div>Shots</div><div>GB</div><div>Saves</div></div>
      <div class="rows" id="rows"><div class="empty-state">Waiting for live stats...</div></div>
    </section>
    <section class="footer-card">
      <div class="footer-label">Live Stats</div>
      <div class="footer-main">AppSheet + Google Sheet Live Feed</div>
      <div class="connection" id="connection">Connecting...</div>
    </section>
  </main>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRx_wGE5L1_eKTCt-SrXgI1kzqPTnZJ5rZVWuNQOg4sUb8AGuW_miP6bXL9aARpCiY/exec";
    const REFRESH_INTERVAL_MS = 3000;

    function getQueryParam(name){return new URLSearchParams(window.location.search).get(name)}
    const GAME_ID = getQueryParam("game") || "";
    const BOARD_TITLE = getQueryParam("title") || "Top Performers";
    const LIMIT = Number(getQueryParam("limit") || 6);

    function escapeHtml(value){return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    function setStatus(text){document.getElementById("connection").textContent=text}
    function setMessage(text,isError=false){document.getElementById("rows").innerHTML=`<div class="empty-state ${isError?"error-state":""}">${escapeHtml(text)}</div>`}

    function normalizePlayer(player){
      const goals = Number(player.goals || player.Goals || 0);
      const assists = Number(player.assists || player.Assists || 0);
      const points = Number(player.points ?? player.Points ?? goals + assists);
      return {
        playerId: player.playerId || player.PlayerID || "",
        name: player.name || player.Name || player.playerName || "Unknown Player",
        team: player.team || player.Team || "",
        jersey: player.jersey || player.Jersey || "",
        goals,
        assists,
        points,
        shots: Number(player.shots || player.Shots || 0),
        gbs: Number(player.gbs || player.GBs || player.gb || player.GB || 0),
        penalties: Number(player.penalties || player.Penalties || 0),
        saves: Number(player.saves || player.Saves || 0)
      };
    }

    function sortPlayers(players){
      return players.sort((a,b)=>b.points-a.points||b.goals-a.goals||b.assists-a.assists||b.shots-a.shots||a.name.localeCompare(b.name));
    }

    function renderGameHeader(data){
      const displayName = data.displayName || data.DisplayName || data["Display Name"] || ("Game " + GAME_ID);
      const homeScore = data.homeScore ?? data.HomeScore ?? "";
      const awayScore = data.awayScore ?? data.AwayScore ?? "";
      const status = data.status || data.Status || "";

      document.getElementById("gameDisplayName").textContent = displayName;

      if(homeScore !== "" || awayScore !== ""){
        document.getElementById("gameScoreline").textContent = `${homeScore || 0} - ${awayScore || 0}${status ? " · " + status : ""}`;
      } else {
        document.getElementById("gameScoreline").textContent = status || "";
      }
    }

    function renderPlayers(players){
      const rows=document.getElementById("rows");
      rows.innerHTML="";
      if(!players.length){setMessage("No player stats found for GameID: " + GAME_ID, true);return}

      sortPlayers(players).slice(0,LIMIT).forEach((player,index)=>{
        const row=document.createElement("div");
        row.className="player-row"+(index===0?" top-player":"");
        const jersey=player.jersey ? "#" + player.jersey : "";
        const sub=[jersey,player.team].filter(Boolean).join(" · ");
        row.innerHTML=`
          <div class="rank">${index+1}</div>
          <div class="player-main">
            <div class="player-name">${escapeHtml(player.name)}</div>
            <div class="player-sub">${escapeHtml(sub || "PlayerID " + player.playerId)}</div>
          </div>
          <div class="stat"><div class="stat-value">${player.goals}</div><div class="stat-label">Goals</div></div>
          <div class="stat"><div class="stat-value">${player.assists}</div><div class="stat-label">Assists</div></div>
          <div class="stat"><div class="stat-value">${player.points}</div><div class="stat-label">Points</div></div>
          <div class="stat"><div class="stat-value">${player.shots}</div><div class="stat-label">Shots</div></div>
          <div class="stat"><div class="stat-value">${player.gbs}</div><div class="stat-label">GB</div></div>
          <div class="stat"><div class="stat-value">${player.saves}</div><div class="stat-label">Saves</div></div>`;
        rows.appendChild(row);
      });
    }

    async function loadStats(){
      try{
        if(!GAME_ID) throw new Error("Missing game ID. Use player-stats-live.html?game=YOUR_GAME_ID");

        setStatus("LOADING LIVE FEED...");
        const url = APPS_SCRIPT_URL + "?game=" + encodeURIComponent(GAME_ID) + "&cache=" + Date.now();
        const response = await fetch(url);

        if(!response.ok) throw new Error("Apps Script request failed HTTP " + response.status);

        const text = await response.text();

        if(text.trim().startsWith("<!DOCTYPE") || text.trim().startsWith("<html")){
          throw new Error("Apps Script returned HTML, not JSON. Check deployment access: Execute as Me, access Anyone.");
        }

        const data = JSON.parse(text);
        const players = Array.isArray(data.players) ? data.players.map(normalizePlayer) : [];

        renderGameHeader(data);
        renderPlayers(players);
        setStatus("LIVE · " + new Date().toLocaleTimeString());
      }catch(error){
        console.error(error);
        setStatus("ERROR");
        setMessage(error.message, true);
      }
    }

    document.addEventListener("DOMContentLoaded",()=>{
      document.getElementById("boardTitle").textContent=BOARD_TITLE;
      renderGameHeader({});
      loadStats();
      setInterval(loadStats, REFRESH_INTERVAL_MS);
    });
  </script>
</body>
</html>
