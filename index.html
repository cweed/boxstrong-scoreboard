<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BeastAve BoxStrong Scoreboard</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;800;900&display=swap');
:root{--bg:#05070d;--panel:rgba(7,11,20,.88);--panel2:rgba(14,20,34,.94);--ice:#00b7ff;--orange:#ff8a1d;--gold:#ffc933;--white:#fff;--muted:#9aa7bd;--danger:#ff3232;--border:rgba(255,255,255,.17)}
*{box-sizing:border-box}body{margin:0;width:100vw;height:100vh;overflow:hidden;background:radial-gradient(circle at 12% 16%,rgba(0,183,255,.25),transparent 28%),radial-gradient(circle at 82% 78%,rgba(255,138,29,.28),transparent 30%),linear-gradient(135deg,#02040a 0%,#111827 50%,#030409 100%);color:var(--white);font-family:Inter,Arial,sans-serif}.scoreboard{width:100vw;height:100vh;padding:3.2vh 3vw;display:grid;grid-template-rows:15vh 1fr 14vh;gap:2.5vh;position:relative}.scoreboard:before{content:"";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at center,black,transparent 75%);pointer-events:none}.top-strip,.lower-third,.team-panel,.shot-clock-card,.possession-card{border:1px solid var(--border);box-shadow:0 0 38px rgba(0,0,0,.45),inset 0 0 24px rgba(255,255,255,.035);backdrop-filter:blur(10px)}.top-strip{z-index:1;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:linear-gradient(90deg,rgba(0,183,255,.18),rgba(0,0,0,.45),rgba(255,138,29,.18));border-radius:2.2vh;padding:1.8vh 2vw}.brand-kicker,.status-label,.shot-label,.possession-label,.ticker-label{color:var(--muted);font-size:1.7vh;letter-spacing:.22em;font-weight:900}.brand-title{font-family:Anton,Impact,sans-serif;font-size:6vh;letter-spacing:.08em;line-height:.9}.game-clock-card{background:#02040a;border:.35vh solid var(--gold);border-radius:2vh;padding:1.1vh 2.2vw;text-align:center;min-width:27vw}.period{font-size:2.5vh;color:var(--gold);font-weight:900;letter-spacing:.16em}.game-clock{font-family:Anton,Impact,sans-serif;font-size:8.3vh;line-height:.95;letter-spacing:.04em;font-variant-numeric:tabular-nums}.status-block{text-align:right}.status-value{font-family:Anton,Impact,sans-serif;color:var(--gold);font-size:4.6vh;letter-spacing:.08em}.main-grid{z-index:1;display:grid;grid-template-columns:1fr 22vw 1fr;gap:2vw;min-height:0}.team-panel{position:relative;overflow:hidden;border-radius:3vh;padding:3vh 2.4vw;display:grid;grid-template-rows:auto auto 1fr auto;background:var(--panel2)}.home-panel{border-left:.65vw solid var(--ice)}.away-panel{border-right:.65vw solid var(--orange)}.team-panel:before{content:"";position:absolute;inset:-20%;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 35%,rgba(255,255,255,.035));transform:skewX(-10deg);pointer-events:none}.team-meta{position:relative;display:flex;justify-content:space-between;color:var(--muted);letter-spacing:.16em;font-weight:900;font-size:2vh}.team-name{position:relative;font-family:Anton,Impact,sans-serif;font-size:clamp(48px,7.2vh,96px);line-height:.98;letter-spacing:.035em;text-transform:uppercase;margin-top:2vh;text-shadow:0 1vh 2vh rgba(0,0,0,.55);word-break:break-word}.score-row{position:relative;display:flex;justify-content:flex-end;align-items:center}.score{font-family:Anton,Impact,sans-serif;font-size:clamp(150px,28vh,320px);line-height:.8;letter-spacing:.02em;font-variant-numeric:tabular-nums}.team-stats{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:.8vw}.team-stats div{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:1.2vh;text-align:center;padding:1.2vh .6vw}.team-stats span{display:block;font-family:Anton,Impact,sans-serif;font-size:4vh}.team-stats label{display:block;color:var(--muted);text-transform:uppercase;font-size:1.45vh;letter-spacing:.18em}.center-stack{display:grid;grid-template-rows:1fr auto 1fr;gap:1.7vh;align-items:center}.shot-clock-card,.possession-card{background:rgba(0,0,0,.52);border-radius:2.5vh;text-align:center;padding:2.2vh 1vw}.shot-clock{font-family:Anton,Impact,sans-serif;font-size:15vh;line-height:.9;color:var(--gold);font-variant-numeric:tabular-nums}.shot-clock-card.warning .shot-clock{color:var(--orange)}.shot-clock-card.expired .shot-clock{color:var(--danger)}.vs-pill{justify-self:center;background:linear-gradient(180deg,#f4f4f4,#737373);color:#080a10;border-radius:999px;padding:1vh 1.8vw;font-family:Anton,Impact,sans-serif;font-size:4.5vh;box-shadow:0 0 26px rgba(255,255,255,.22)}.possession{font-family:Anton,Impact,sans-serif;font-size:4vh;color:var(--white);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lower-third{z-index:1;display:grid;grid-template-columns:auto 1fr 1.2fr;align-items:center;gap:2vw;border-radius:2.2vh;padding:1.7vh 2vw;background:linear-gradient(90deg,rgba(0,0,0,.58),rgba(0,183,255,.12),rgba(255,138,29,.12))}.ticker-main{font-family:Anton,Impact,sans-serif;font-size:5vh;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ticker-sub{text-align:right;font-size:3vh;font-weight:900;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.connection{position:absolute;right:1vw;bottom:.5vh;color:rgba(255,255,255,.35);font-size:1.2vh;letter-spacing:.12em}@media(max-width:900px){.scoreboard{grid-template-rows:auto auto auto;overflow:auto}.top-strip,.main-grid,.lower-third{grid-template-columns:1fr}.status-block,.ticker-sub{text-align:left}}

.team-identity{
  position:relative;
  display:block;
  margin-top:1.4vh;
  min-width:0;
}
.team-logo{
  width:8.5vw;
  height:8.5vw;
  display:none;
  align-items:center;
  justify-content:center;
  margin-bottom:1vh;
}
.away-panel .team-logo{
  margin-left:auto;
}
.team-logo img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  filter:drop-shadow(0 .6vh 1.2vh rgba(0,0,0,.55));
}
.team-logo.has-logo{display:flex}
.team-identity.no-logo .team-logo{display:none}
.team-identity .team-name{
  max-width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  word-break:normal;
  overflow-wrap:normal;
  hyphens:none;
  font-size:clamp(42px,6.4vh,88px);
}


/* Logo/name layout fix: prevents weird wrapping with long team names. */
.team-panel{min-width:0}
.team-name{
  white-space:nowrap !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
  word-break:normal !important;
  overflow-wrap:normal !important;
  hyphens:none !important;
}
.team-identity{min-width:0;width:100%}

</style>
</head>
<body>
  <main class="scoreboard" id="scoreboard">
    <section class="top-strip">
      <div class="brand-block">
        <div class="brand-kicker">BEASTAVE</div>
        <div class="brand-title" data-field="leagueTitle">BOXSTRONG</div>
      </div>
      <div class="game-clock-card">
        <div class="period" data-field="period">Q1</div>
        <div class="game-clock" data-field="gameClock">12:00</div>
      </div>
      <div class="status-block">
        <div class="status-label">STATUS</div>
        <div class="status-value" data-field="gameStatus">LIVE</div>
      </div>
    </section>
    <section class="main-grid">
      <article class="team-panel home-panel">
        <div class="team-meta"><span>HOME</span><span class="record" data-field="homeRecord">0-0</span></div>
        <div class="team-identity no-logo" id="homeIdentity"><div class="team-logo" id="homeLogoWrap"><img id="homeLogoImg" alt="Home logo" /></div><div class="team-name" data-field="homeTeam">SABRETOOTHS</div></div>
        <div class="score-row"><div class="score" data-field="homeScore">0</div></div>
        <div class="team-stats">
          <div><span data-field="homeShots">0</span><label>Shots</label></div>
          <div><span data-field="homePenalties">0</span><label>Pen</label></div>
          <div><span data-field="homeTimeouts">2</span><label>TO</label></div>
        </div>
      </article>
      <section class="center-stack">
        <div class="shot-clock-card" id="shotClockCard">
          <div class="shot-label">SHOT CLOCK</div>
          <div class="shot-clock" data-field="shotClock">30</div>
        </div>
        <div class="vs-pill">VS</div>
        <div class="possession-card">
          <div class="possession-label">POSSESSION</div>
          <div class="possession" data-field="possession">--</div>
        </div>
      </section>
      <article class="team-panel away-panel">
        <div class="team-meta"><span>AWAY</span><span class="record" data-field="awayRecord">0-0</span></div>
        <div class="team-identity no-logo" id="awayIdentity"><div class="team-logo" id="awayLogoWrap"><img id="awayLogoImg" alt="Away logo" /></div><div class="team-name" data-field="awayTeam">PHOENIX</div></div>
        <div class="score-row"><div class="score" data-field="awayScore">0</div></div>
        <div class="team-stats">
          <div><span data-field="awayShots">0</span><label>Shots</label></div>
          <div><span data-field="awayPenalties">0</span><label>Pen</label></div>
          <div><span data-field="awayTimeouts">2</span><label>TO</label></div>
        </div>
      </article>
    </section>
    <section class="lower-third">
      <div class="ticker-label">LAST GOAL</div>
      <div class="ticker-main" data-field="lastGoal">--</div>
      <div class="ticker-sub" data-field="note">Week 1 Matchup</div>
    </section>
    <div class="connection" data-field="connection">LOCAL CONTROL</div>
  </main>
  <script>
const SCOREBOARD_KEY = "beastave_boxstrong_scoreboard_v3";

const defaultState = {
  leagueTitle: "BOXSTRONG",
  gameStatus: "LIVE",
  period: "Q1",
  gameClock: "12:00",
  shotClock: "30",
  homeTeam: "SABRETOOTHS",
  awayTeam: "PHOENIX",
  homeLogo: "",
  awayLogo: "",
  homeRecord: "0-0",
  awayRecord: "0-0",
  homeScore: 0,
  awayScore: 0,
  homeShots: 0,
  awayShots: 0,
  homePenalties: 0,
  awayPenalties: 0,
  homeTimeouts: 2,
  awayTimeouts: 2,
  possession: "--",
  lastGoal: "--",
  note: "Week 1 Matchup",
  connection: "LOCAL CONTROL"
};

function getScoreboardState() {
  const raw = localStorage.getItem(SCOREBOARD_KEY);
  if (!raw) return { ...defaultState };
  try {
    return { ...defaultState, ...JSON.parse(raw) };
  } catch (error) {
    console.error("Could not parse saved scoreboard state.", error);
    return { ...defaultState };
  }
}

function saveScoreboardState(nextState) {
  const state = { ...defaultState, ...nextState };
  localStorage.setItem(SCOREBOARD_KEY, JSON.stringify(state));
  window.dispatchEvent(new CustomEvent("scoreboard-state-updated", { detail: state }));
}

function mmssToSeconds(value) {
  const parts = String(value || "0:00").split(":").map(Number);
  if (parts.length !== 2 || parts.some(Number.isNaN)) return 0;
  return Math.max(0, parts[0] * 60 + parts[1]);
}

function secondsToMmss(total) {
  const safe = Math.max(0, Number(total) || 0);
  const minutes = Math.floor(safe / 60);
  const seconds = safe % 60;
  return `${minutes}:${String(seconds).padStart(2, "0")}`;
}

function clampNumber(value, min = 0, max = 999) {
  return Math.min(max, Math.max(min, Number(value) || 0));
}

if (!localStorage.getItem(SCOREBOARD_KEY)) {
  saveScoreboardState(defaultState);
}
</script>
  <script>
function renderDisplay() {
  const state = getScoreboardState();
  document.querySelectorAll("[data-field]").forEach((el) => {
    const key = el.dataset.field;
    if (key in state) el.textContent = state[key];
  });

  function updateLogo(side, logoPath) {
    const img = document.getElementById(side + "LogoImg");
    const wrap = document.getElementById(side + "LogoWrap");
    const identity = document.getElementById(side + "Identity");

    if (!img || !wrap || !identity) return;

    if (logoPath && logoPath.trim()) {
      img.src = logoPath.trim();
      wrap.classList.add("has-logo");
      identity.classList.remove("no-logo");
    } else {
      img.removeAttribute("src");
      wrap.classList.remove("has-logo");
      identity.classList.add("no-logo");
    }
  }

  updateLogo("home", state.homeLogo);
  updateLogo("away", state.awayLogo);

  const shotCard = document.getElementById("shotClockCard");
  const shot = Number(state.shotClock);
  if (shotCard) {
    shotCard.classList.toggle("warning", shot <= 10 && shot > 0);
    shotCard.classList.toggle("expired", shot === 0);
  }
}

window.addEventListener("storage", renderDisplay);
window.addEventListener("scoreboard-state-updated", renderDisplay);
setInterval(renderDisplay, 250);
renderDisplay();
</script>
</body>
</html>
