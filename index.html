<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Lacrosse Scoreboard</title>
  <style>
    :root {
      --bg: #05070d;
      --panel: rgba(12, 18, 30, 0.92);
      --accent: #f47b20;
      --accent2: #00a3ff;
      --white: #ffffff;
      --muted: #b8c2d6;
      --danger: #ff3b3b;
      --border: rgba(255,255,255,0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 25% 20%, rgba(0,163,255,0.22), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(244,123,32,0.22), transparent 30%),
        linear-gradient(135deg, #05070d 0%, #111827 55%, #05070d 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
    }

    .scoreboard {
      width: 100vw;
      height: 100vh;
      padding: 4vh 4vw;
      display: grid;
      grid-template-rows: 15vh 1fr 18vh;
      gap: 3vh;
    }

    .top-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 2vw;
    }

    .league-title {
      font-size: 3.2vh;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .period-clock {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5vw;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 1.6vh 2.4vw;
      box-shadow: 0 0 40px rgba(0,0,0,0.35);
    }

    .period {
      font-size: 4.2vh;
      font-weight: 900;
      color: var(--accent);
      text-transform: uppercase;
      min-width: 8vw;
      text-align: center;
    }

    .clock {
      font-size: 7.5vh;
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .status {
      text-align: right;
      font-size: 3vh;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--muted);
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3vw;
      min-height: 0;
    }

    .team-card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 34px;
      padding: 4vh 3vw;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,0,0,0.45);
    }

    .team-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 40%);
      pointer-events: none;
    }

    .home .team-label {
      color: var(--accent2);
    }

    .away .team-label {
      color: var(--accent);
    }

    .team-label {
      position: relative;
      z-index: 2;
      font-size: 3vh;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    .team-name {
      position: relative;
      z-index: 2;
      align-self: center;
      font-size: 8vh;
      line-height: 0.95;
      font-weight: 950;
      text-transform: uppercase;
      word-break: break-word;
      text-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    .score {
      position: relative;
      z-index: 2;
      font-size: 20vh;
      line-height: 0.85;
      font-weight: 950;
      text-align: right;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .bottom-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2vw;
      align-items: stretch;
    }

    .info-box {
      background: rgba(0,0,0,0.38);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 2.2vh 2vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }

    .info-label {
      font-size: 2vh;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-weight: 800;
      margin-bottom: 0.6vh;
    }

    .info-value {
      font-size: 4.2vh;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .goal-highlight {
      color: var(--accent);
    }

    .small {
      font-size: 3.2vh;
    }

    .connection {
      position: absolute;
      right: 1vw;
      bottom: 1vh;
      font-size: 1.5vh;
      color: rgba(255,255,255,0.35);
    }

    @media (max-aspect-ratio: 1/1) {
      .scoreboard {
        grid-template-rows: auto 1fr auto;
        padding: 3vh 4vw;
      }

      .top-bar {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .status {
        text-align: center;
      }

      .teams {
        grid-template-columns: 1fr;
      }

      .team-name {
        font-size: 5vh;
      }

      .score {
        font-size: 12vh;
      }

      .bottom-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="scoreboard">
    <section class="top-bar">
      <div class="league-title" id="leagueTitle">BOX LACROSSE LEAGUE</div>

      <div class="period-clock">
        <div class="period" id="period">Q1</div>
        <div class="clock" id="clock">12:00</div>
      </div>

      <div class="status" id="gameStatus">LIVE</div>
    </section>

    <section class="teams">
      <div class="team-card home">
        <div class="team-label">Home</div>
        <div class="team-name" id="homeTeam">Sabretooths</div>
        <div class="score" id="homeScore">0</div>
      </div>

      <div class="team-card away">
        <div class="team-label">Away</div>
        <div class="team-name" id="awayTeam">Phoenix</div>
        <div class="score" id="awayScore">0</div>
      </div>
    </section>

    <section class="bottom-bar">
      <div class="info-box">
        <div class="info-label">Last Goal</div>
        <div class="info-value goal-highlight" id="lastGoal">--</div>
      </div>

      <div class="info-box">
        <div class="info-label">Assist</div>
        <div class="info-value small" id="assist">--</div>
      </div>

      <div class="info-box">
        <div class="info-label">Penalty / Note</div>
        <div class="info-value small" id="note">--</div>
      </div>
    </section>
  </main>

  <div class="connection" id="connectionStatus">Waiting for Google Sheet...</div>

  <script>
    /*
      HOW TO CONNECT YOUR GOOGLE SHEET

      1. Create a Google Sheet with these headers in Row 1:
         LeagueTitle | HomeTeam | AwayTeam | HomeScore | AwayScore | Period | Clock | GameStatus | LastGoal | Assist | Note

      2. Put the current scoreboard values in Row 2.

      3. In Google Sheets:
         File > Share > Publish to web
         Choose the scoreboard tab
         Format: Comma-separated values (.csv)
         Publish

      4. Copy the published CSV link.

      5. Paste it below between the quotes.
    */

	  const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZHko22GCu_4uPwesCjYbY2wDtUjap13CV80KAY4j2uk1vZLYieYSMwntGO3ROsh4G3ui4EU2TvntM/pub?output=csv";
	  
    // How often OBS checks the Google Sheet, in milliseconds.
    // 3000 = every 3 seconds.
    const REFRESH_INTERVAL_MS = 3000;

    const fallbackData = {
      LeagueTitle: "BOX LACROSSE LEAGUE",
      HomeTeam: "Sabretooths",
      AwayTeam: "Phoenix",
      HomeScore: "0",
      AwayScore: "0",
      Period: "Q1",
      Clock: "12:00",
      GameStatus: "LIVE",
      LastGoal: "--",
      Assist: "--",
      Note: "--"
    };

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function csvToObject(csvText) {
      const lines = csvText.trim().split(/\r?\n/);
      if (lines.length < 2) return fallbackData;

      const headers = parseCSVLine(lines[0]).map(h => h.trim());
      const values = parseCSVLine(lines[1]).map(v => v.trim());

      const data = {};
      headers.forEach((header, index) => {
        data[header] = values[index] || "";
      });

      return { ...fallbackData, ...data };
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value || "--";
    }

    function updateScoreboard(data) {
      setText("leagueTitle", data.LeagueTitle);
      setText("homeTeam", data.HomeTeam);
      setText("awayTeam", data.AwayTeam);
      setText("homeScore", data.HomeScore);
      setText("awayScore", data.AwayScore);
      setText("period", data.Period);
      setText("clock", data.Clock);
      setText("gameStatus", data.GameStatus);
      setText("lastGoal", data.LastGoal);
      setText("assist", data.Assist);
      setText("note", data.Note);
    }

    async function loadScoreboard() {
      const status = document.getElementById("connectionStatus");

      if (!GOOGLE_SHEET_CSV_URL || GOOGLE_SHEET_CSV_URL.includes("PASTE_YOUR")) {
        updateScoreboard(fallbackData);
        status.textContent = "Demo mode: paste your published Google Sheet CSV URL in the HTML file.";
        return;
      }

      try {
        const cacheBuster = Date.now();
        const url = GOOGLE_SHEET_CSV_URL + (GOOGLE_SHEET_CSV_URL.includes("?") ? "&" : "?") + "cache=" + cacheBuster;

        const response = await fetch(url);
        if (!response.ok) throw new Error("Google Sheet failed to load.");

        const csvText = await response.text();
        const data = csvToObject(csvText);
        updateScoreboard(data);

        const now = new Date();
        status.textContent = "Connected · Updated " + now.toLocaleTimeString();
      } catch (error) {
        status.textContent = "Connection error · Check Google Sheet publish settings.";
        console.error(error);
      }
    }

    loadScoreboard();
    setInterval(loadScoreboard, REFRESH_INTERVAL_MS);
  </script>
</body>
</html>
