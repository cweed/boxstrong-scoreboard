<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BeastAve BoxStrong Scoreboard - Penalty Lower Third</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;800;900&display=swap');
:root{--bg:#050505;--panel:rgba(12,12,12,.92);--panel2:rgba(18,18,18,.96);--ice:#ff6a00;--orange:#ff8c1a;--gold:#ffb347;--white:#fff;--muted:#b8aea3;--danger:#ff3232;--border:rgba(255,140,26,.25)}
*{box-sizing:border-box}body{margin:0;width:100vw;height:100vh;overflow:hidden;background:radial-gradient(circle at 15% 15%,rgba(255,106,0,.18),transparent 30%),radial-gradient(circle at 85% 80%,rgba(255,140,26,.18),transparent 30%),linear-gradient(135deg,#000000 0%,#111111 50%,#050505 100%);color:var(--white);font-family:Inter,Arial,sans-serif}.scoreboard{width:100vw;height:100vh;padding:3.2vh 3vw;display:grid;grid-template-rows:15vh 1fr 14vh;gap:2.5vh;position:relative}.scoreboard:before{content:"";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at center,black,transparent 75%);pointer-events:none}.top-strip,.lower-third,.team-panel,.shot-clock-card,.possession-card{border:1px solid var(--border);box-shadow:0 0 38px rgba(0,0,0,.45),inset 0 0 24px rgba(255,255,255,.035);backdrop-filter:blur(10px)}.top-strip{z-index:1;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:linear-gradient(90deg,rgba(255,106,0,.22),rgba(0,0,0,.55),rgba(255,140,26,.22));border-radius:2.2vh;padding:1.8vh 2vw}.brand-kicker,.status-label,.shot-label,.possession-label,.ticker-label{color:var(--muted);font-size:1.7vh;letter-spacing:.22em;font-weight:900}.brand-title{font-family:Anton,Impact,sans-serif;font-size:6vh;letter-spacing:.08em;line-height:.9}.game-clock-card{background:#02040a;border:.35vh solid var(--gold);border-radius:2vh;padding:1.1vh 2.2vw;text-align:center;min-width:27vw}.period{font-size:2.5vh;color:var(--gold);font-weight:900;letter-spacing:.16em}.game-clock{font-family:Anton,Impact,sans-serif;font-size:8.3vh;line-height:.95;letter-spacing:.04em;font-variant-numeric:tabular-nums}.status-block{text-align:right}.status-value{font-family:Anton,Impact,sans-serif;color:var(--gold);font-size:4.6vh;letter-spacing:.08em}.main-grid{z-index:1;display:grid;grid-template-columns:1fr 22vw 1fr;gap:2vw;min-height:0}.team-panel{position:relative;overflow:hidden;border-radius:3vh;padding:3vh 2.4vw;display:grid;grid-template-rows:auto auto 1fr auto;background:var(--panel2)}.home-panel{border-left:.65vw solid var(--ice)}.away-panel{border-right:.65vw solid var(--orange)}.team-panel:before{content:"";position:absolute;inset:-20%;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 35%,rgba(255,255,255,.035));transform:skewX(-10deg);pointer-events:none}.team-meta{position:relative;display:flex;justify-content:space-between;color:var(--muted);letter-spacing:.16em;font-weight:900;font-size:2vh}.team-name{position:relative;font-family:Anton,Impact,sans-serif;font-size:clamp(48px,7.2vh,96px);line-height:.98;letter-spacing:.035em;text-transform:uppercase;margin-top:2vh;text-shadow:0 1vh 2vh rgba(0,0,0,.55);word-break:break-word}.score-row{position:relative;display:flex;justify-content:flex-end;align-items:center}.score{font-family:Anton,Impact,sans-serif;font-size:clamp(150px,28vh,320px);line-height:.8;letter-spacing:.02em;font-variant-numeric:tabular-nums}.team-stats{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:.8vw}.team-stats div{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:1.2vh;text-align:center;padding:1.2vh .6vw}.team-stats span{display:block;font-family:Anton,Impact,sans-serif;font-size:4vh}.team-stats label{display:block;color:var(--muted);text-transform:uppercase;font-size:1.45vh;letter-spacing:.18em}.center-stack{display:grid;grid-template-rows:1fr auto 1fr;gap:1.7vh;align-items:center}.shot-clock-card,.possession-card{background:rgba(0,0,0,.52);border-radius:2.5vh;text-align:center;padding:2.2vh 1vw}.shot-clock{font-family:Anton,Impact,sans-serif;font-size:15vh;line-height:.9;color:var(--gold);font-variant-numeric:tabular-nums}.shot-clock-card.warning .shot-clock{color:var(--orange)}.shot-clock-card.critical .shot-clock{color:var(--danger);animation:shotPulse .45s infinite}.shot-clock-card.expired .shot-clock{color:var(--danger)}.shot-clock-card.buzz{animation:buzzFlash .35s ease-in-out 5}.penalty-card{background:rgba(0,0,0,.52);border:1px solid var(--border);border-radius:2.2vh;text-align:center;padding:1.6vh 1vw;box-shadow:0 0 38px rgba(0,0,0,.45),inset 0 0 24px rgba(255,255,255,.035);backdrop-filter:blur(10px)}.penalty-title{color:var(--muted);font-size:1.45vh;letter-spacing:.18em;font-weight:900;margin-bottom:.9vh}.penalty-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7vw}.penalty-side{background:rgba(255,255,255,.04);border:1px solid rgba(255,140,26,.22);border-radius:1.2vh;padding:.9vh .4vw}.penalty-side label{display:block;color:var(--muted);font-size:1.1vh;text-transform:uppercase;letter-spacing:.15em;font-weight:900}.penalty-time{display:block;font-family:Anton,Impact,sans-serif;font-size:3.3vh;color:var(--gold);font-variant-numeric:tabular-nums;line-height:1}.penalty-time.active{color:var(--danger)}.audio-enable{position:absolute;left:1vw;bottom:.7vh;z-index:10;background:rgba(255,140,26,.95);color:#090909;border:0;border-radius:999px;padding:.9vh 1.1vw;font-weight:900;letter-spacing:.08em;cursor:pointer}.audio-enable.hidden{display:none}@keyframes shotPulse{0%,100%{transform:scale(1);text-shadow:0 0 18px rgba(255,50,50,.65)}50%{transform:scale(1.08);text-shadow:0 0 40px rgba(255,50,50,1)}}@keyframes buzzFlash{0%,100%{box-shadow:0 0 38px rgba(0,0,0,.45),inset 0 0 24px rgba(255,255,255,.035)}50%{box-shadow:0 0 55px rgba(255,50,50,.9),inset 0 0 42px rgba(255,50,50,.28);background:rgba(255,0,0,.38)}}.vs-pill{justify-self:center;background:linear-gradient(180deg,#1a1a1a,#050505);color:var(--orange);border:.18vh solid rgba(255,140,26,.75);border-radius:999px;padding:1vh 1.8vw;font-family:Anton,Impact,sans-serif;font-size:4.5vh;box-shadow:0 0 26px rgba(255,106,0,.32)}.possession{font-family:Anton,Impact,sans-serif;font-size:4vh;color:var(--white);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lower-third{z-index:1;display:grid;grid-template-columns:auto minmax(0,1.2fr) auto minmax(0,.75fr) minmax(0,1fr);align-items:center;gap:1.3vw;border-radius:2.2vh;padding:1.5vh 2vw;background:linear-gradient(90deg,rgba(0,0,0,.58),rgba(255,106,0,.14),rgba(255,138,29,.12))}.penalty-lower-label{color:var(--danger)}.penalty-lower{font-family:Anton,Impact,sans-serif;font-size:4.2vh;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums}.penalty-lower.active{color:var(--danger);text-shadow:0 0 22px rgba(255,50,50,.7)}.ticker-main{font-family:Anton,Impact,sans-serif;font-size:5vh;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ticker-sub{text-align:right;font-size:3vh;font-weight:900;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.connection{position:absolute;right:1vw;bottom:.5vh;color:rgba(255,255,255,.35);font-size:1.2vh;letter-spacing:.12em}@media(max-width:900px){.scoreboard{grid-template-rows:auto auto auto;overflow:auto}.top-strip,.main-grid,.lower-third{grid-template-columns:1fr}.status-block,.ticker-sub{text-align:left}}

.team-identity{
  position:relative;
  display:block;
  margin-top:1.4vh;
  min-width:0;
}
.team-logo{
  width:8.5vw;
  height:8.5vw;
  display:none;
  align-items:center;
  justify-content:center;
  margin-bottom:1vh;
}
.away-panel .team-logo{
  margin-left:auto;
}
.team-logo img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  filter:drop-shadow(0 .6vh 1.2vh rgba(0,0,0,.55));
}
.team-logo.has-logo{display:flex}
.team-identity.no-logo .team-logo{display:none}
.team-identity .team-name{
  max-width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  word-break:normal;
  overflow-wrap:normal;
  hyphens:none;
  font-size:clamp(42px,6.4vh,88px);
}


/* Logo/name layout fix: prevents weird wrapping with long team names. */
.team-panel{min-width:0}
.team-name{
  white-space:nowrap !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
  word-break:normal !important;
  overflow-wrap:normal !important;
  hyphens:none !important;
}
.team-identity{min-width:0;width:100%}


/* v6 fix: keep shots / penalties / timeouts visible with logos enabled */
.team-panel{
  min-height:0 !important;
  grid-template-rows:auto auto minmax(0,1fr) auto !important;
  padding:2.2vh 2.1vw !important;
}

.team-identity{
  margin-top:1vh !important;
}

.team-logo{
  width:6.8vw !important;
  height:6.8vw !important;
  margin-bottom:.6vh !important;
}

.team-identity .team-name{
  font-size:clamp(34px,5.4vh,74px) !important;
  line-height:.95 !important;
}

.score-row{
  min-height:0 !important;
  align-items:center !important;
}

.score{
  font-size:clamp(120px,22vh,250px) !important;
}

.team-stats{
  display:grid !important;
  grid-template-columns:repeat(3,1fr) !important;
  gap:.65vw !important;
  margin-top:1vh !important;
  position:relative !important;
  z-index:5 !important;
}

.team-stats div{
  min-height:7.5vh !important;
  padding:.75vh .45vw !important;
  display:flex !important;
  flex-direction:column !important;
  align-items:center !important;
  justify-content:center !important;
}

.team-stats span{
  font-size:3.1vh !important;
  line-height:1 !important;
}

.team-stats label{
  font-size:1.15vh !important;
  line-height:1.1 !important;
}

/* Prevent the big score from covering the stats row on shorter OBS/browser windows */
@media (max-height: 850px){
  .team-logo{
    width:5.8vw !important;
    height:5.8vw !important;
  }
  .team-identity .team-name{
    font-size:clamp(30px,4.7vh,64px) !important;
  }
  .score{
    font-size:clamp(100px,19vh,220px) !important;
  }
  .team-stats div{
    min-height:6.5vh !important;
  }
}

</style>
</head>
<body>
<main class="scoreboard" id="scoreboard">
    <section class="top-strip">
      <div class="brand-block">
        <div class="brand-kicker">BEASTAVE</div>
        <div class="brand-title" data-field="leagueTitle">BOXSTRONG</div>
      </div>
      <div class="game-clock-card">
        <div class="period" data-field="period">Q1</div>
        <div class="game-clock" data-field="gameClock">12:00</div>
      </div>
      <div class="status-block">
        <div class="status-label">STATUS</div>
        <div class="status-value" data-field="gameStatus">LIVE</div>
      </div>
    </section>
    <section class="main-grid">
      <article class="team-panel home-panel">
        <div class="team-meta"><span>HOME</span><span class="record" data-field="homeRecord">0-0</span></div>
        <div class="team-identity no-logo" id="homeIdentity"><div class="team-logo" id="homeLogoWrap"><img id="homeLogoImg" alt="Home logo" /></div><div class="team-name" data-field="homeTeam">SABRETOOTHS</div></div>
        <div class="score-row"><div class="score" data-field="homeScore">0</div></div>
        <div class="team-stats">
          <div><span data-field="homeShots">0</span><label>Shots</label></div>
          <div><span data-field="homePenalties">0</span><label>Pen</label></div>
          <div><span data-field="homeTimeouts">2</span><label>TO</label></div>
        </div>
      </article>
      <section class="center-stack">
        <div class="shot-clock-card" id="shotClockCard">
          <div class="shot-label">SHOT CLOCK</div>
          <div class="shot-clock" data-field="shotClock">30</div>
        </div>
        <div class="vs-pill">VS</div>
        <div class="possession-card">
          <div class="possession-label">POSSESSION</div>
          <div class="possession" data-field="possession">--</div>
        </div>
      </section>
      <article class="team-panel away-panel">
        <div class="team-meta"><span>AWAY</span><span class="record" data-field="awayRecord">0-0</span></div>
        <div class="team-identity no-logo" id="awayIdentity"><div class="team-logo" id="awayLogoWrap"><img id="awayLogoImg" alt="Away logo" /></div><div class="team-name" data-field="awayTeam">PHOENIX</div></div>
        <div class="score-row"><div class="score" data-field="awayScore">0</div></div>
        <div class="team-stats">
          <div><span data-field="awayShots">0</span><label>Shots</label></div>
          <div><span data-field="awayPenalties">0</span><label>Pen</label></div>
          <div><span data-field="awayTimeouts">2</span><label>TO</label></div>
        </div>
      </article>
    </section>
    <section class="lower-third">
      <div class="ticker-label">LAST GOAL</div>
      <div class="ticker-main" data-field="lastGoal">--</div>
      <div class="ticker-label penalty-lower-label">PENALTY</div>
      <div class="penalty-lower" id="penaltyLowerDisplay">--</div>
      <div class="ticker-sub" data-field="note">Week 1 Matchup</div>
    </section>
    <button class="audio-enable" id="enableAudioButton" type="button">ENABLE ARENA AUDIO</button>
    <div class="connection" data-field="connection">LOCAL CONTROL</div>
  </main>

<audio id="shotClockBuzzer" preload="auto" crossorigin="anonymous" src="https://cweed.github.io/boxstrong-scoreboard/Sounds/Buzzer.mp3"></audio>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
const defaultState = {
  leagueTitle: "BOXSTRONG",
  gameStatus: "LIVE",
  period: "Q1",
  gameClock: "12:00",
  shotClock: "30",
  homeTeam: "SABRETOOTHS",
  awayTeam: "PHOENIX",
  homeLogo: "",
  awayLogo: "",
  homeRecord: "0-0",
  awayRecord: "0-0",
  homeScore: 0,
  awayScore: 0,
  homeShots: 0,
  awayShots: 0,
  homePenalties: 0,
  awayPenalties: 0,
  homePenaltyTime: "--",
  awayPenaltyTime: "--",
  homeTimeouts: 2,
  awayTimeouts: 2,
  possession: "--",
  lastGoal: "--",
  note: "Week 1 Matchup",
  connection: "FIREBASE LIVE"
};

function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const SCOREBOARD_GAME_ID = getQueryParam("game") || window.BEASTAVE_DEFAULT_GAME_ID || "week-1";
let currentState = { ...defaultState };

function mmssToSeconds(value) {
  const parts = String(value || "0:00").split(":").map(Number);
  if (parts.length !== 2 || parts.some(Number.isNaN)) return 0;
  return Math.max(0, parts[0] * 60 + parts[1]);
}

function secondsToMmss(total) {
  const safe = Math.max(0, Number(total) || 0);
  const minutes = Math.floor(safe / 60);
  const seconds = safe % 60;
  return `${minutes}:${String(seconds).padStart(2, "0")}`;
}

function clampNumber(value, min = 0, max = 999) {
  return Math.min(max, Math.max(min, Number(value) || 0));
}

function requireFirebaseConfig() {
  if (!window.BEASTAVE_FIREBASE_CONFIG || !window.BEASTAVE_FIREBASE_CONFIG.apiKey) {
    throw new Error("Missing Firebase config. Open firebase-config.js and paste your Firebase web app config.");
  }
}

function initFirebaseScoreboard(onStateChange) {
  requireFirebaseConfig();

  if (!firebase.apps.length) {
    firebase.initializeApp(window.BEASTAVE_FIREBASE_CONFIG);
  }

  const db = firebase.database();
  const gameRef = db.ref(`scoreboards/${SCOREBOARD_GAME_ID}`);

  gameRef.on("value", async (snapshot) => {
    const data = snapshot.val();

    if (!data) {
      await gameRef.set({
        ...defaultState,
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      });
      return;
    }

    currentState = { ...defaultState, ...data, connection: `FIREBASE LIVE · ${SCOREBOARD_GAME_ID}` };
    if (typeof onStateChange === "function") onStateChange(currentState);
  }, (error) => {
    console.error("Firebase listener error:", error);
    currentState = { ...currentState, connection: "FIREBASE ERROR" };
    if (typeof onStateChange === "function") onStateChange(currentState);
  });

  return gameRef;
}

function updateFirebaseState(patch) {
  if (!window.beastAveGameRef) {
    console.error("Firebase game ref is not ready yet.");
    return Promise.reject(new Error("Firebase game ref is not ready yet."));
  }

  return window.beastAveGameRef.update({
    ...patch,
    updatedAt: firebase.database.ServerValue.TIMESTAMP
  });
}

function getScoreboardState() {
  return { ...currentState };
}
</script>
<script>
let audioUnlocked = false;
let previousShotClock = null;

function unlockArenaAudio() {
  const buzzer = document.getElementById("shotClockBuzzer");
  const button = document.getElementById("enableAudioButton");
  if (!buzzer) return;
  buzzer.volume = 1;
  buzzer.play().then(() => {
    buzzer.pause();
    buzzer.currentTime = 0;
    audioUnlocked = true;
    if (button) button.classList.add("hidden");
  }).catch((error) => {
    console.warn("Audio unlock blocked:", error);
    if (button) button.textContent = "CLICK AGAIN TO ENABLE AUDIO";
  });
}

function playShotClockBuzzer() {
  const buzzer = document.getElementById("shotClockBuzzer");
  const shotCard = document.getElementById("shotClockCard");
  if (shotCard) {
    shotCard.classList.remove("buzz");
    void shotCard.offsetWidth;
    shotCard.classList.add("buzz");
  }
  if (!buzzer) return;
  buzzer.volume = 1;
  buzzer.pause();
  buzzer.currentTime = 0;
  buzzer.play().catch((error) => console.warn("Buzzer playback blocked:", error));
}

function isActivePenalty(value) {
  return value && value !== "--" && value !== "0:00" && value !== "00" && value !== "0";
}

function updateLogo(side, logoPath) {
  const img = document.getElementById(side + "LogoImg");
  const wrap = document.getElementById(side + "LogoWrap");
  const identity = document.getElementById(side + "Identity");

  if (!img || !wrap || !identity) return;

  if (logoPath && logoPath.trim()) {
    img.src = logoPath.trim();
    wrap.classList.add("has-logo");
    identity.classList.remove("no-logo");
  } else {
    img.removeAttribute("src");
    wrap.classList.remove("has-logo");
    identity.classList.add("no-logo");
  }
}

function renderDisplay(state) {
  document.querySelectorAll("[data-field]").forEach((el) => {
    const key = el.dataset.field;
    if (key in state) el.textContent = state[key];
  });

  updateLogo("home", state.homeLogo);
  updateLogo("away", state.awayLogo);

  const shotCard = document.getElementById("shotClockCard");
  const shot = Number(state.shotClock);
  if (shotCard) {
    shotCard.classList.toggle("warning", shot <= 10 && shot > 5);
    shotCard.classList.toggle("critical", shot <= 5 && shot > 0);
    shotCard.classList.toggle("expired", shot === 0);

    if (previousShotClock !== null && previousShotClock > 0 && shot === 0) {
      playShotClockBuzzer();
    }
    previousShotClock = shot;
  }

  const penaltyLowerDisplay = document.getElementById("penaltyLowerDisplay");
  if (penaltyLowerDisplay) {
    const homeActive = isActivePenalty(state.homePenaltyTime);
    const awayActive = isActivePenalty(state.awayPenaltyTime);
    const homeLabel = String(state.homeTeam || "HOME").toUpperCase();
    const awayLabel = String(state.awayTeam || "AWAY").toUpperCase();

    if (homeActive && awayActive) {
      penaltyLowerDisplay.textContent = `${homeLabel} ${state.homePenaltyTime}  |  ${awayLabel} ${state.awayPenaltyTime}`;
    } else if (homeActive) {
      penaltyLowerDisplay.textContent = `${homeLabel} ${state.homePenaltyTime}`;
    } else if (awayActive) {
      penaltyLowerDisplay.textContent = `${awayLabel} ${state.awayPenaltyTime}`;
    } else {
      penaltyLowerDisplay.textContent = "--";
    }

    penaltyLowerDisplay.classList.toggle("active", homeActive || awayActive);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  const audioButton = document.getElementById("enableAudioButton");
  if (audioButton) audioButton.addEventListener("click", unlockArenaAudio);
  document.addEventListener("click", () => { audioUnlocked = true; }, { once: true });
  document.addEventListener("keydown", () => { audioUnlocked = true; }, { once: true });
  try {
    window.beastAveGameRef = initFirebaseScoreboard(renderDisplay);
    renderDisplay(getScoreboardState());
  } catch (error) {
    console.error(error);
    document.querySelectorAll("[data-field='connection']").forEach((el) => {
      el.textContent = "CONFIG ERROR";
    });
    alert(error.message);
  }
});
</script>
</body>
</html>
